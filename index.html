<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MindAR Video Player</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>

html,body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#000;
}

/* Floating Video */

#floatingVideo{

display:none;

position:fixed;

top:50%;

left:50%;

transform:translate(-50%,-50%);

width:95%;

max-width:420px;

border-radius:15px;

box-shadow:0 0 30px rgba(0,0,0,.6);

z-index:99999;

background:#000;

}

#closeBtn{

display:none;

position:fixed;

top:20px;

right:20px;

z-index:100000;

padding:12px 18px;

font-size:18px;

border:none;

border-radius:8px;

background:red;

color:#fff;

cursor:pointer;

}

</style>

</head>

<body>

<a-scene

mindar-image="imageTargetSrc: ./target.mind;"

color-space="sRGB"

renderer="colorManagement:true"

vr-mode-ui="enabled:false"

device-orientation-permission-ui="enabled:false">

<a-camera

position="0 0 0"

look-controls="enabled:false">

</a-camera>

<a-entity

id="target"

mindar-image-target="targetIndex:0">

</a-entity>

</a-scene>

<button id="closeBtn">✕ Close</button>

<video

id="floatingVideo"

src="./video.mp4"

controls

playsinline

webkit-playsinline

preload="auto">

</video>

<script>

const target=document.querySelector("#target");

const video=document.querySelector("#floatingVideo");

const closeBtn=document.querySelector("#closeBtn");

let played=false;

// Target Found

target.addEventListener("targetFound",()=>{

if(played) return;

played=true;

video.style.display="block";

closeBtn.style.display="block";

video.play();

});

// Close Button

closeBtn.onclick=function(){

video.pause();

video.currentTime=0;

video.style.display="none";

closeBtn.style.display="none";

played=false;

}

// Video End

video.onended=function(){

video.style.display="none";

closeBtn.style.display="none";

played=false;

}

</script>

</body>

</html>
