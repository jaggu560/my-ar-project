<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.5.0/dist/aframe-master.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>
  <a-scene
    mindar-image="imageTargetSrc: ./target.mind;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <video
        id="myvideo"
        src="./video.mp4"
        loop
        muted
        playsinline
        webkit-playsinline>
      </video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-video
        src="#myvideo"
        width="1"
        height="1.78"
        position="0 0 0">
      </a-video>
    </a-entity>
  </a-scene>

<script>
  const floatingVideo = document.getElementById("floatingVideo");
  const target = document.getElementById("target");

  target.addEventListener("targetFound", () => {
    floatingVideo.style.display = "block";
    floatingVideo.play();
  });

  target.addEventListener("targetLost", () => {
    // Do nothing. Video continues playing.
  });

  floatingVideo.addEventListener("ended", () => {
    floatingVideo.style.display = "none";
    floatingVideo.currentTime = 0;
  });
</script>

  <video id="floatingVideo" src="./video.mp4" controls playsinline style="
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:90%;
  max-height:90%;
  z-index:99999;
  background:black;">
</video>
</body>
</html>
